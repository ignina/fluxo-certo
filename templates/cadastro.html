<!DOCTYPE html>
<html>
<head>
    <title>Cadastro - Fluxo Certo</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #43a047, #1b5e20);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border: 1px solid #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #388E3C;
            transform: scale(1.02);
        }

        .erro {
            color: red;
            margin-bottom: 10px;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #2E7D32;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        img {
            width: 120px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="box">

    <img src="{{ url_for('static', filename='img/1-Logo-FluxoCerto-site.png') }}">

    <h3>Criar Conta</h3>

    {% if erro %}
        <p class="erro">{{ erro }}</p>
    {% endif %}

    <form method="POST" action="/salvar-usuario">
        <input type="text" name="usuario" placeholder="Usuário" required autofocus>
        <input type="password" name="senha" placeholder="Senha" required>

        <button type="submit">Cadastrar</button>


    </form>

    <a href="/">Voltar para login</a>

</div>

</body>
</html>
