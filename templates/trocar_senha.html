<!DOCTYPE html>
<html>
<head>
    <title>Trocar Senha</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: #4E95D9;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        h2 {
            margin-bottom: 10px;
        }

    </style>
</head>

<body>

<div class="container">

<h2>🔒 Trocar Senha</h2>

<p>Por segurança, defina uma nova senha para continuar.</p>

<form method="POST">
    <input type="password" name="senha" placeholder="Nova senha" required>
    <button type="submit">Salvar</button>
</form>

</div>

</body>
</html>
