<!DOCTYPE html>
<html>
<head>
    <title>Editar Compra</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background-color: #f4f6f8;
}

/* CONTAINER */
.container {
    width: 95%;
    max-width: 600px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
}

/* TOPO */
.topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

h1 {
    margin: 0;
    font-size: 20px;
}

/* BOTÃO VOLTAR */
.btn-voltar {
    background: #4E95D9;
    color: white !important;
    padding: 6px 12px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 13px;
}

/* FORM */
label {
    display: block;
    margin-bottom: 5px;
    font-size: 13px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* BOTÃO */
.btn {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    background-color: #4E95D9;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    background: #3b7bb8;
}

.btn:active {
    transform: scale(0.97);
}

/* MOBILE */
@media (max-width: 768px) {
    .container {
        width: 100%;
        margin: 0;
        border-radius: 0;
    }
}

</style>
</head>

<body>

<div class="container">

<!-- TOPO -->
<div class="topo">
    <a href="/cartao" class="btn-voltar">⬅ Voltar</a>
    <h1>Editar Compra</h1>
</div>

<form action="/atualizar_cartao/{{ dado[0] }}" method="post">

    <label>Data</label>
    <input type="date" name="data_compra" value="{{ dado[1] }}" required>

    <label>Descrição</label>
    <input type="text" name="descricao" value="{{ dado[4] }}" required>

    <label>Valor</label>
    <input type="number" step="0.01" name="valor_total" value="{{ dado[2] }}" required>

    <label>Parcelas</label>
    <input type="number" name="parcelas" value="{{ dado[3] }}" required>

    <label>Cartão</label>
    <select name="nome_cartao">
        {% for c in cartoes %}
        <option value="{{ c[1] }}"
            {% if c[1] == dado[5] %}selected{% endif %}>
            {{ c[1] }}
        </option>
        {% endfor %}
    </select>

    <button type="submit" class="btn">
        💾 Atualizar
    </button>

</form>

</div>

</body>
</html>
