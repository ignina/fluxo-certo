<!DOCTYPE html>
<html>
<head>
    <title>Editar Lançamento</title>

    <style>

body {
    margin: 0;
    font-family: Arial;
    background-color: #f4f6f8;
}

/* CONTAINER */
.container {
    width: 95%;
    max-width: 600px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
}

/* TOPO */
.topo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 15px;
}

h2 {
    margin: 0;
    font-size: 20px;
}

/* BOTÃO VOLTAR */
.btn-voltar {
    background: #4E95D9;
    color: white;
    padding: 6px 10px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 13px;
}

/* FORM */
label {
    display: block;
    margin-bottom: 5px;
    font-size: 13px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* CHECKBOX */
.checkbox {
    margin: 10px 0;
}

/* BOTÃO */
.btn {
    width: 100%;
    padding: 10px;
    background-color: #4E95D9;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    background: #3b7bb8;
}

.btn:active {
    transform: scale(0.97);
}

/* MOBILE */
@media (max-width: 768px) {
    .container {
        width: 100%;
        margin: 0;
        border-radius: 0;
    }
}

    </style>
</head>

<body>

<div class="container">

    <!-- TOPO -->
    <div class="topo">
        <a href="/livrocaixa" class="btn-voltar">⬅ Voltar</a>
        <h2>Editar</h2>
    </div>

    <form action="/atualizar/{{ dado[0] }}" method="post">

        <label>Data:</label>
        <input type="date" name="data" value="{{ dado[1] }}">

        <label>Descrição:</label>
        <input type="text" name="descricao" value="{{ dado[2] }}">

        <label>Tipo:</label>
        <select name="tipo">
            <option value="Receita" {% if dado[4] == 'Receita' %}selected{% endif %}>Receita</option>
            <option value="Despesa" {% if dado[4] == 'Despesa' %}selected{% endif %}>Despesa</option>
        </select>

        <label>Valor:</label>
        <input type="number" step="0.01" name="valor" value="{{ dado[3] }}">

        <div class="checkbox">
            <label style="display:flex; align-items:center; gap:6px;">
                <input type="checkbox" name="pago" value="1" style="width:auto;"
                {% if dado[5] == 1 %}checked{% endif %}>
                Pago
            </label>
        </div>

        <button type="submit" class="btn">💾 Atualizar</button>

    </form>

</div>

</body>
</html>
